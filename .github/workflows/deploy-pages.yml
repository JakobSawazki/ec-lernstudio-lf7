name: Test and deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate JavaScript syntax
        run: |
          node --check website/content.js
          node --check website/app.js
          node --check website/service-worker.js

      - name: Check required website files
        run: |
          test -f website/index.html
          test -f website/styles.css
          test -f website/manifest.webmanifest
          test -f website/icon.png
          test -f website/assets/ec-lernstudio-logo.png
          test -f website/assets/lf7-marketing-lab.png
          test -f website/assets/ecommerce-consultation-hero.png
          test -f website/assets/module-icons/lf2-2-2-layout.png
          test -f website/assets/module-icons/lf2-2-3-sortiment.png
          test -f website/assets/module-icons/lf2-2-4-impressum.png
          test -f website/assets/module-icons/lf2-2-5-haftung.png
          test -f website/assets/module-icons/lf2-2-6-produktdetailseite.png
          test -f website/assets/module-icons/lf2-2-7-kundeninformationen.png
          test -f website/assets/module-icons/lf2-2-8-produktbeschreibung.png
          test -f website/assets/module-icons/lf2-2-9-artikelauswahl.png
          test -f website/assets/module-icons/lf2-2-10-visualisierungen.png
          test -f website/assets/module-icons/lf2-2-12-preisgestaltung.png
          test -f website/assets/module-icons/lf2-2-16-warenwirtschaft.png
          test -f website/assets/module-icons/lf6-6-0-servicekanaele.png
          test -f website/assets/module-icons/lf6-6-13-email.png
          test -f website/assets/module-icons/lf6-6-14-social-media.png
          test -f website/assets/module-icons/lf6-6-15-vertriebswege.png
          test -f website/assets/module-icons/lf9-9-4-shopsoftware.png
          test -f website/assets/module-icons/lf9-9-9-hardware-software.png
          test -f website/assets/module-icons/lf9-9-10-hardware.png
          test -f website/assets/module-icons/lf9-9-11-software.png
          test -f website/assets/materials/lf2-2-2-webshop-layout-arbeitsblatt.pdf
          test -f website/assets/materials/lf2-2-3-webshop-seiten-arbeitsblatt.pdf
          test -f website/assets/materials/lf2-2-4-impressum-arbeitsblatt.pdf
          test -f website/assets/materials/lf2-2-5-haftung-arbeitsblatt.pdf
          test -f website/assets/materials/lf2-2-6-produktdetailseite-arbeitsblatt.pdf
          test -f website/assets/materials/lf2-2-7-kundeninformationen-arbeitsblatt.pdf
          test -f website/assets/materials/lf2-2-8-produktbeschreibung-arbeitsblatt.pdf
          test -f website/assets/materials/lf2-2-9-artikelauswahl-arbeitsblatt.pdf
          test -f website/assets/materials/lf2-2-10-visualisierungen-arbeitsblatt.pdf
          test -f website/assets/materials/lf2-2-12-preisgestaltung-arbeitsblatt.pdf
          test -f website/assets/materials/lf2-2-16-warenwirtschaft-arbeitsblatt.pdf
          test -f website/assets/materials/lf6-servicekanaele-arbeitsblatt.pdf
          test -f website/assets/materials/lf6-email-arbeitsblatt.pdf
          test -f website/assets/materials/lf6-social-media-arbeitsblatt.pdf
          test -f website/assets/materials/lf6-vertriebswege-arbeitsblatt.pdf
          test -f website/assets/materials/lf7-seo-sea-transferfall.pdf
          test -f website/assets/materials/lf7-webanalyse-arbeitsblatt.pdf
          test -f website/assets/materials/lf2-projektidee-ecommerce-homepage.pdf
          test -f website/assets/materials/dv-lehrplan-kompass.pdf
          test -f website/assets/materials/lf9-9-4-shopsoftware-arbeitsblatt.pdf
          test -f website/assets/materials/lf9-9-9-hardware-software-arbeitsblatt.pdf
          test -f website/assets/materials/lf9-9-10-hardware-arbeitsblatt.pdf
          test -f website/assets/materials/lf9-9-11-software-arbeitsblatt.pdf

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload website
        uses: actions/upload-pages-artifact@v5
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
